version: '3.8'

services:
  backend:
    build: .
    container_name: innovatech_backend
    restart: always
    ports:
      - "3001:3001"
    environment:
      PORT: ${PORT:-3001}
      DB_HOST: ${DB_HOST:-localhost}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME:-innovatech_ops}
      DB_USER: ${DB_USER:-innovatech_user}
      DB_PASSWORD: ${DB_PASSWORD:-innovatech_password}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
    labels:
      - "com.innovatech.service=backend"
